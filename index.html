<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brew Logger</title>
    <link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#7cf2d4">

<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/brewlogger-v3/service-worker.js");
  }
</script>

</head>
<body>
    <div id="brewGrid" class="brew-grid"></div>

    <button id="newBrewBtn" class="fab">+</button>

    <div id="modalBackdrop" class="modal-backdrop hidden"></div>

    <div id="brewModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-top">
                <div class="modal-photo-wrapper">
                    <img id="modalPhoto" class="modal-photo" alt="">
                </div>
                <button id="changePhotoBtn" class="mini-pill small">Change Photo</button>
                <input type="file" id="photoInput" accept="image/*" class="hidden">
                <div class="modal-actions">
                    <button id="closeModal" class="close-btn">×</button>
                </div>
                <h1 id="modalTitle" class="modal-title">New Brew</h1>
            </div>

            <div class="modal-body">
                <section class="card">
                    <label>Title</label>
                    <input id="titleInput" class="pill-input">

                    <label>SKU</label>
                    <input id="skuInput" class="pill-input">

                    <label>Vessel</label>
                    <select id="vesselSelect" class="pill-select">
                        <option value="">Select...</option>
                        <option>1L plastic</option>
                        <option>2L plastic</option>
                        <option>5L plastic</option>
                        <option>3L glass demijohn</option>
                        <option>5L glass demijohn</option>
                        <option>10L glass demijohn</option>
                        <option>10L bucket fermenter</option>
                        <option>25L bucket fermenter</option>
                        <option>23L barrel</option>
                        <option>30L barrel</option>
                        <option>Pressure barrel</option>
                        <option>Corny keg</option>
                        <option>Other</option>
                    </select>
                </section>

                <section class="card">
                    <div class="card-header">
                        <h2>Ingredients</h2>
                        <button id="addIngredient" class="mini-pill">Add</button>
                    </div>
                    <div id="ingredientList"></div>
                </section>

                <section class="card">
                    <h2>Primary Fermentation</h2>

                    <label>Date Started</label>
                    <input type="date" id="dateStarted" class="pill-input">

                    <label>OG</label>
                    <input id="ogInput" class="pill-input">

                    <label>Notes</label>
                    <textarea id="notesStart" class="pill-textarea"></textarea>
                </section>

                <section class="card">
                    <div class="card-header">
                        <h2>Racking</h2>
                        <button id="addRackingStage" class="mini-pill">Add</button>
                    </div>
                    <div id="rackingList"></div>
                </section>

                <section class="card">
                    <h2>Bottling</h2>

                    <label>Bottling Date</label>
                    <input type="date" id="bottlingDate" class="pill-input">

                    <label>FG</label>
                    <input id="fgInput" class="pill-input">

                    <label>Final Notes</label>
                    <textarea id="notesFinal" class="pill-textarea"></textarea>
                </section>
            </div>

            <div class="modal-footer">
                <div class="footer-actions">
                    <button id="duplicateBrew" class="footer-btn footer-secondary">Duplicate</button>
                    <button id="openScale" class="footer-btn footer-secondary">Scale</button>
                    <button id="saveBrew" class="footer-btn footer-primary">Save Brew</button>
                </div>
            </div>
        </div>
    </div>

    <div id="deleteModal" class="confirm-modal hidden">
        <div class="confirm-card">
            <h2>Delete brew?</h2>
            <p id="deleteMessage">Are you sure you want to delete this brew?</p>
            <div class="confirm-actions">
                <button id="cancelDelete" class="pill-secondary">Cancel</button>
                <button id="confirmDelete" class="pill-danger">Delete</button>
            </div>
        </div>
    </div>

    <div id="scaleModal" class="confirm-modal hidden">
        <div class="confirm-card scale-card">
            <h2>Scale recipe</h2>
            <div class="scale-options">
                <button class="scale-option" data-factor="1">1×</button>
                <button class="scale-option" data-factor="2">2×</button>
                <button class="scale-option" data-factor="3">3×</button>
                <button class="scale-option" data-factor="4">4×</button>
                <button class="scale-option" data-action="custom">Custom…</button>
                <button class="scale-option scale-cancel" data-action="cancel">Cancel</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
